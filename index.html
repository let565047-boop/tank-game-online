<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank.io - Joystick Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; background: #020617; touch-action: none; font-family: system-ui, sans-serif; color: white; overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* Giao diện sảnh chuẩn giữa màn hình */
        #lobby-container { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            width: 100vw; height: 100vh; position: absolute; z-index: 50; 
        }

        /* Giao diện trong trận dàn hàng ngang */
        #game-container { 
            position: relative; display: none; flex-direction: row; 
            align-items: center; justify-content: space-between; 
            width: 100vw; height: 100vh; padding: 0 5vw; box-sizing: border-box; 
        }

        #gameCanvas { 
            background: #0f172a; border: 2px solid #1e293b; border-radius: 12px; 
            height: 85vmin; width: 85vmin; order: 2; 
        }

        /* Vùng chứa Joystick bên trái */
        #joystick-zone { 
            width: 150px; height: 150px; order: 1; position: relative; 
            background: rgba(255,255,255,0.03); border-radius: 50%; 
        }

        /* Vùng chứa nút bắn bên phải */
        .controls-right { 
            order: 3; width: 150px; display: flex; justify-content: center; 
        }

        .shoot-btn { 
            width: 80px; height: 80px; background: #ef4444; border-radius: 50%; 
            border: none; border-bottom: 6px solid #991b1b; font-size: 35px; 
            display: flex; align-items: center; justify-content: center; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .shoot-btn:active { border-bottom: 0; transform: translateY(6px); }

        #msg-box { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; opacity: 0; z-index: 100; font-size: 12px; }
        
        @media screen and (orientation: portrait) { 
            #game-container { flex-direction: column !important; justify-content: center; gap: 20px; } 
            #gameCanvas { width: 80vw; height: 80vw; } 
        }
    </style>
</head>
<body>
    <div id="msg-box" class="font-bold text-amber-400">Thông báo!</div>

    <div id="lobby-container">
        <div id="lobby" class="bg-slate-900/95 p-8 rounded-[2rem] shadow-2xl w-full max-w-sm border border-slate-800 text-center">
            <h1 class="text-5xl font-black mb-8 text-amber-500 italic uppercase">Tank.io</h1>
            <div class="space-y-4">
                <input id="player-name" type="text" placeholder="Tên của sen" class="w-full p-4 bg-slate-950 rounded-xl border border-slate-800 outline-none text-white font-bold">
                <input id="room-id" type="text" placeholder="Mã phòng" class="w-full p-4 bg-slate-950 rounded-xl border border-slate-800 outline-none text-amber-500 font-bold">
                <button onclick="joinRoomAction()" class="w-full bg-amber-600 p-4 rounded-xl font-bold uppercase shadow-lg">Vào Phòng</button>
            </div>
        </div>

        <div id="waiting-room" class="hidden bg-slate-900/95 p-8 rounded-[2rem] shadow-2xl w-full max-w-sm border border-slate-800 text-center">
            <h2 class="text-xl font-bold mb-4 italic text-slate-300">PHÒNG CHỜ</h2>
            <div id="player-list" class="space-y-2 mb-6 text-left"></div>
            <div id="host-controls" class="hidden border-t border-slate-800 pt-4">
                <p class="text-xs text-slate-400 mb-2 uppercase font-bold text-left ml-2">Chọn Bản Đồ:</p>
                <select id="map-type" class="w-full p-4 bg-slate-950 rounded-xl border border-slate-800 text-amber-500 font-bold mb-4 outline-none">
                    <option value="classic">Mê Cung</option>
                    <option value="arena">Đấu Trường</option>
                    <option value="fortress">Pháo Đài</option>
                </select>
                <button onclick="triggerStartGame()" class="w-full bg-emerald-600 p-4 rounded-xl font-black uppercase text-lg shadow-lg">KHAI CHIẾN!</button>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div id="joystick-zone"></div>
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div class="controls-right">
            <button onclick="shoot()" class="shoot-btn">💣</button>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoom, remotePlayers = {}, bullets = [], items = [], maze = [], gameActive = false;
        const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
        const keys = {};

        window.addEventListener('contextmenu', e => e.preventDefault());

        socket.on('game-started', (data) => {
            maze = data.map === "RANDOM" ? generateMaze(currentRoom) : data.map;
            if (data.players) remotePlayers = data.players;
            
            // Chuyển cảnh: Ẩn sảnh, Hiện game
            document.getElementById('lobby-container').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            
            gameActive = true;
            initJoystick();
            gameLoop();
        });

        // HÀM KHỞI TẠO JOYSTICK
        function initJoystick() {
            const options = { 
                zone: document.getElementById('joystick-zone'), 
                mode: 'static', 
                position: {left: '50%', top: '50%'}, 
                color: 'white', 
                size: 100 
            };
            const manager = nipplejs.create(options);
            
            manager.on('move', (evt, data) => {
                if (data.direction) {
                    const angle = data.angle.degree;
                    // Chuyển góc xoay thành các phím di chuyển
                    keys['KeyW'] = angle > 45 && angle < 135;
                    keys['KeyS'] = angle > 225 && angle < 315;
                    keys['KeyA'] = angle > 135 && angle < 225;
                    keys['KeyD'] = angle < 45 || angle > 315;
                }
            });
            
            manager.on('end', () => { 
                keys['KeyW'] = keys['KeyS'] = keys['KeyA'] = keys['KeyD'] = false; 
            });
        }

        window.joinRoomAction = () => {
            const rId = document.getElementById('room-id').value.trim(), pName = document.getElementById('player-name').value.trim() || "Sen";
            if(!rId) return; currentRoom = rId;
            socket.emit('join-room', { roomId: rId, playerName: pName, color: '#ef4444' });
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('waiting-room').classList.remove('hidden');
        };

        socket.on('update-players', p => {
            remotePlayers = p;
            document.getElementById('player-list').innerHTML = Object.values(p).map(player => `
                <div class="p-3 bg-slate-800 rounded-xl border-l-4" style="border-left-color: ${player.color}">
                    <span class="font-bold">${player.name} ${player.id===socket.id?'(BẠN)':''}</span>
                </div>
            `).join('');
            if(p[socket.id]?.isHost) document.getElementById('host-controls').classList.remove('hidden');
        });

        socket.on('player-moved', d => { if(remotePlayers[d.id]) Object.assign(remotePlayers[d.id], d); });
        socket.on('new-bullet', b => { if(b.owner !== socket.id) bullets.push(b); });
        socket.on('spawn-items', i => items = i);
        socket.on('game-over', d => { alert(d.result); location.reload(); });

        function generateMaze(seed) {
            const m = Array(15).fill().map(() => Array(15).fill(1));
            let sNum = 0; for(let i=0; i<seed.length; i++) sNum += seed.charCodeAt(i);
            const rnd = () => { sNum = (sNum * 9301 + 49297) % 233280; return sNum / 233280; };
            function walk(x, y) { m[y][x] = 0; const dirs = [[0, 2], [0, -2], [2, 0], [-2, 0]].sort(() => rnd() - 0.5); for (let [dx, dy] of dirs) { let nx = x+dx, ny = y+dy; if (nx>0 && nx<14 && ny>0 && ny<14 && m[ny][nx]===1) { m[y+dy/2][x+dx/2]=0; walk(nx, ny); } } }
            walk(1, 1); return m;
        }

        function triggerStartGame() { socket.emit('start-game', { roomId: currentRoom, mapType: document.getElementById('map-type').value }); }
        
        function shoot() {
            const me = remotePlayers[socket.id];
            if (!gameActive || !me?.alive) return;
            const b = { x: me.x + Math.cos(me.angle)*25, y: me.y + Math.sin(me.angle)*25, vx: Math.cos(me.angle)*6, vy: Math.sin(me.angle)*6, owner: socket.id, roomId: currentRoom, damage: 35, traveled: 0 };
            socket.emit('shoot', b); bullets.push(b);
        }

        function canMoveTo(nx, ny) {
            const p = 12; const pts = [{x:nx-p,y:ny-p}, {x:nx+p,y:ny-p}, {x:nx-p,y:ny+p}, {x:nx+p,y:ny+p}];
            for (let pt of pts) {
                const tx = Math.floor(pt.x / 40), ty = Math.floor(pt.y / 40);
                if (!maze[ty] || maze[ty][tx] === 1) return false;
            }
            return true;
        }

        function update() {
            const me = remotePlayers[socket.id];
            if (!gameActive || !me?.alive) return;
            let dx = 0, dy = 0;
            if (keys['KeyW']) dy = -me.speed; if (keys['KeyS']) dy = me.speed;
            if (keys['KeyA']) dx = -me.speed; if (keys['KeyD']) dx = me.speed;

            if (dx !== 0 || dy !== 0) {
                const nx = me.x+dx, ny = me.y+dy, angle = Math.atan2(dy, dx);
                if (canMoveTo(nx, me.y)) me.x = nx;
                if (canMoveTo(me.x, ny)) me.y = ny;
                me.angle = angle;
                socket.emit('move', { roomId: currentRoom, x: me.x, y: me.y, angle: me.angle });
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i]; b.x += b.vx; b.y += b.vy; b.traveled += 6;
                if (b.traveled > 320 || !canMoveTo(b.x, b.y)) { bullets.splice(i, 1); continue; }
                if (b.owner === socket.id) {
                    Object.values(remotePlayers).forEach(p => {
                        if (p.id !== socket.id && p.alive && Math.sqrt((b.x - p.x)**2 + (b.y - p.y)**2) < 22) {
                            socket.emit('hit', { roomId: currentRoom, targetId: p.id, damage: 35 });
                            bullets.splice(i, 1);
                        }
                    });
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, 600, 600);
            ctx.fillStyle = '#1e293b';
            for (let y = 0; y < 15; y++) for (let x = 0; x < 15; x++) if (maze[y][x] === 1) ctx.fillRect(x*40, y*40, 40, 40);
            Object.values(remotePlayers).forEach(p => {
                if (!p.alive) return;
                ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.angle);
                ctx.fillStyle = p.color; ctx.fillRect(-15, -12, 30, 24);
                ctx.fillStyle = '#000'; ctx.fillRect(0, -3, 20, 6);
                ctx.restore();
                ctx.fillStyle = 'white'; ctx.font = "bold 10px Arial"; ctx.textAlign = 'center'; ctx.fillText(p.name, p.x, p.y - 42);
            });
            ctx.fillStyle = '#fbbf24'; bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill(); });
        }
        function gameLoop() { if(gameActive) { update(); draw(); requestAnimationFrame(gameLoop); } }
    </script>
</body>
</html>
