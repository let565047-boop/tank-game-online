<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Tank.io</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #020617;
            overflow: hidden;
            font-family: system-ui;
            touch-action: none;
            color: white;
        }

        #lobby-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .result-screen {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .hidden {
            display: none;
        }

        #result-text {
            font-size: 55px;
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 0 0 20px white;
        }

        .restart-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 14px;
            background: #10b981;
            color: white;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        #game-container {
            display: none;
            width: 100vw;
            height: 100vh;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        #gameCanvas {
            background: #0f172a;
            border: 2px solid #1e293b;
            border-radius: 12px;
        }

        #joystick-zone {
            width: 150px;
            height: 150px;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            overflow: hidden;
        }

        .shoot-btn {
            width: 90px;
            height: 90px;
            border: none;
            border-radius: 50%;
            background: #ef4444;
            color: white;
            font-size: 35px;
        }

        .controls {
            width: 90vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .color-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
        }

        .color-btn.active {
            border-color: white;
            transform: scale(1.15);
        }

        @media (orientation:portrait) {
            #game-container {
                flex-direction: column;
            }

            #gameCanvas {
                width: 85vw;
                height: 85vw;
            }
        }
    </style>
</head>

<body>

    <div id="lobby-container">
        <div class="bg-slate-900 p-8 rounded-3xl w-full max-w-sm">
            <h1 class="text-4xl font-black text-center mb-6 text-amber-500">
                Tank.io
            </h1>

            <div class="space-y-4">
                <input id="player-name" placeholder="Tên người chơi"
                    class="w-full p-4 rounded-xl bg-slate-950 border border-slate-800 outline-none">

                <div class="grid grid-cols-2 gap-3">
                    <button id="create-btn" onclick="createRoomAction()" class="p-4 rounded-xl bg-blue-600 font-bold text-sm">
                        TẠO PHÒNG 👑
                    </button>
                    <button id="join-btn" onclick="joinRoomAction()" class="p-4 rounded-xl bg-amber-600 font-bold text-sm">
                        VÀO PHÒNG 👥
                    </button>
                </div>

                <input id="room-id" placeholder="Mã phòng muốn vào / tạo"
                    class="w-full p-4 rounded-xl bg-slate-950 border border-slate-800 outline-none">

                <div id="map-select-zone" class="space-y-2">
                    <label class="text-xs text-slate-400 font-bold">CHỌN BẢN ĐỒ (CHỈ CHỦ PHÒNG):</label>
                    <select id="map-type" class="w-full p-4 rounded-xl bg-slate-950 border border-slate-800">
                        <option value="classic">Classic</option>
                        <option value="arena">Arena</option>
                        <option value="cross">Cross</option>
                        <option value="zigzag">Zigzag</option>
                        <option value="fortress">Fortress</option>
                    </select>
                </div>

                <div id="lobby-waiting-zone" class="hidden border-t border-slate-800 pt-3 space-y-3">
                    <h3 class="text-sm font-bold text-slate-400">THÀNH VIÊN TRONG PHÒNG:</h3>
                    <div id="player-list" class="space-y-2 bg-slate-950 p-3 rounded-xl border border-slate-800 max-h-32 overflow-y-auto">
                    </div>

                    <button id="host-start-btn" onclick="hostStartGame()"
                        class="w-full p-4 rounded-xl bg-emerald-600 font-bold hidden">
                        BẮT ĐẦU TRẬN ĐẤU 🎮
                    </button>

                    <div id="waiting-text" class="text-center text-amber-400 text-sm font-medium pt-2 hidden">
                        Đang đợi chủ phòng bắt đầu trận đấu...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div class="controls">
            <div id="joystick-zone"></div>
            <button onclick="shoot()" class="shoot-btn">💣</button>
        </div>
    </div>

    <div id="game-result" class="result-screen hidden">
        <div id="result-text"></div>
        <button onclick="location.reload()" class="restart-btn">CHƠI LẠI</button>
    </div>

    <script>
        const socket = io();

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let currentRoom = "";
        let selectedColor = "#ef4444";

        let remotePlayers = {};
        let bullets = [];
        let items = [];
        let maze = [];

        let gameActive = false;
        let speedBuffEnd = 0;
        let damageBuffEnd = 0;
        let itemMessage = "";
        let itemMessageTime = 0;
        let isIHost = false;
        const keys = {};

        function selectColor(color, el) {
            selectedColor = color;
            document.querySelectorAll(".color-btn").forEach(b => b.classList.remove("active"));
            el.classList.add("active");
        }

        // SỬA: Thêm hàm tạo phòng sinh mã tự động cho chủ phòng
        function createRoomAction() {
            const playerName = document.getElementById("player-name").value.trim() || "Chủ Phòng";
            let roomId = document.getElementById("room-id").value.trim();
            if (!roomId) {
                roomId = Math.floor(1000 + Math.random() * 9000).toString();
                document.getElementById("room-id").value = roomId;
            }
            currentRoom = roomId;
            isIHost = true;
            socket.emit("join-room", { roomId, playerName, color: selectedColor, forceHost: true });
        }

        function joinRoomAction() {
            const roomId = document.getElementById("room-id").value.trim();
            const playerName = document.getElementById("player-name").value.trim() || "Người Chơi";
            if (!roomId) {
                alert("Vui lòng nhập Mã phòng để vào!");
                return;
            }
            currentRoom = roomId;
            isIHost = false;
            socket.emit("join-room", { roomId, playerName, color: selectedColor, forceHost: false });
        }

        function hostStartGame() {
            if (!currentRoom) return;
            socket.emit("start-game", {
                roomId: currentRoom,
                mapType: document.getElementById("map-type").value
            });
        }

        // SỬA: Hàm success xử lý ẩn/hiển thị phân quyền chuẩn chỉ
        socket.on("join-success", (data) => {
            console.log("Đã vào phòng thành công:", data.roomId);
            isIHost = data.isHost;

            document.getElementById("player-name").disabled = true;
            document.getElementById("room-id").disabled = true;
            document.getElementById("create-btn").style.display = "none";
            document.getElementById("join-btn").style.display = "none";

            document.getElementById("lobby-waiting-zone").classList.remove("hidden");

            if (isIHost) {
                document.getElementById("host-start-btn").classList.remove("hidden");
                document.getElementById("map-select-zone").classList.remove("hidden");
            } else {
                document.getElementById("waiting-text").classList.remove("hidden");
                document.getElementById("map-select-zone").classList.add("hidden"); 
            }
        });

        // SỬA: Hàm hiển thị danh sách người chơi phòng chờ và làm nổi bật chủ phòng
        socket.on("update-players", (players) => { 
            remotePlayers = players; 
            const playerListDiv = document.getElementById("player-list");
            if (!playerListDiv) return;
            playerListDiv.innerHTML = ""; 

            Object.values(players).forEach(p => {
                const item = document.createElement("div");
                item.className = "flex items-center justify-between p-2 rounded-lg text-sm bg-slate-900 border border-slate-800";
                
                if (p.isHost) {
                    item.innerHTML = `<span class="text-amber-400 font-black flex items-center gap-1">👑 ${p.name} (Chủ Phòng)</span>
                                      <span class="w-3 h-3 rounded-full" style="background-color: ${p.color}"></span>`;
                    item.className += " border-amber-500 bg-amber-950/20 shadow-sm shadow-amber-500/20";
                } else {
                    item.innerHTML = `<span class="text-slate-300 font-medium">👤 ${p.name}</span>
                                      <span class="w-3 h-3 rounded-full" style="background-color: ${p.color}"></span>`;
                }
                playerListDiv.appendChild(item);
            });
        });

        socket.on("game-started", (data) => {
            maze = data.maze || [];
            remotePlayers = data.players || {};
            document.getElementById("lobby-container").style.display = "none";
            document.getElementById("game-container").style.display = "flex";
            gameActive = true;
            initJoystick();
            gameLoop();
        });

        socket.on("player-moved", (d) => {
            if (remotePlayers[d.id]) { Object.assign(remotePlayers[d.id], d); }
        });

        socket.on("spawn-items", (i) => { items = i; });
        socket.on("new-bullet", (b) => { bullets.push(b); });

        function initJoystick() {
            const manager = nipplejs.create({
                zone: document.getElementById("joystick-zone"),
                mode: "static",
                position: { left: "75px", top: "75px" },
                color: "white",
                size: 100
            });

            manager.on("move", (evt, data) => {
                if (!data.direction) return;
                keys["KeyW"] = false; keys["KeyS"] = false; keys["KeyA"] = false; keys["KeyD"] = false;
                const dir = data.direction.angle;
                if (dir === "up") keys["KeyW"] = true;
                if (dir === "down") keys["KeyS"] = true;
                if (dir === "left") keys["KeyA"] = true;
                if (dir === "right") keys["KeyD"] = true;
            });

            manager.on("end", () => {
                keys["KeyW"] = false; keys["KeyS"] = false; keys["KeyA"] = false; keys["KeyD"] = false;
            });
        }

        function shoot() {
            const me = remotePlayers[socket.id];
            if (!me || !me.alive) return;
            socket.emit("shoot", { roomId: currentRoom, x: me.x, y: me.y, angle: me.angle });
        }

        function update() {
            const me = remotePlayers[socket.id];
            if (!me || !me.alive) return;

            const baseSpeed = me.baseSpeed || me.speed || 4;
            const speedBoost = me.speedBoost || 0;

            if (Date.now() > speedBuffEnd) {
                me.speedBoost = 0;
            }

            let dx = 0;
            let dy = 0;
            const moveSpeed = (baseSpeed + speedBoost) * 0.25;

            if (keys["KeyW"]) dy -= moveSpeed;
            if (keys["KeyS"]) dy += moveSpeed;
            if (keys["KeyA"]) dx -= moveSpeed;
            if (keys["KeyD"]) dx += moveSpeed;

            if (dx !== 0 || dy !== 0) {
                me.angle = Math.atan2(dy, dx);
            }

            const tankSize = 15;

            if (dx !== 0) {
                let newX = me.x + dx;
                let left = Math.floor((newX - tankSize) / 40);
                let right = Math.floor((newX + tankSize) / 40);
                let top = Math.floor((me.y - tankSize) / 40);
                let bottom = Math.floor((me.y + tankSize) / 40);

                if (maze[top] && maze[bottom] &&
                    maze[top][left] === 0 && maze[top][right] === 0 &&
                    maze[bottom][left] === 0 && maze[bottom][right] === 0) {
                    me.x = newX;
                }
            }

            if (dy !== 0) {
                let newY = me.y + dy;
                let left = Math.floor((me.x - tankSize) / 40);
                let right = Math.floor((me.x + tankSize) / 40);
                let top = Math.floor((newY - tankSize) / 40);
                let bottom = Math.floor((newY + tankSize) / 40);

                if (maze[top] && maze[bottom] &&
                    maze[top][left] === 0 && maze[top][right] === 0 &&
                    maze[bottom][left] === 0 && maze[bottom][right] === 0) {
                    me.y = newY;
                }
            }

            me.x = Math.max(20, Math.min(canvas.width - 20, me.x));
            me.y = Math.max(20, Math.min(canvas.height - 20, me.y));

            bullets.forEach((b, index) => {
                b.x += Math.cos(b.angle) * 8;
                b.y += Math.sin(b.angle) * 8;

                const gx = Math.floor(b.x / 40);
                const gy = Math.floor(b.y / 40);

                if (maze[gy] && maze[gy][gx] === 1) {
                    bullets.splice(index, 1);
                    return;
                }

                Object.values(remotePlayers).forEach(p => {
                    if (!p.alive || p.id === b.id) return;
                    const dist = Math.hypot(p.x - b.x, p.y - b.y);

                    if (dist < 20) {
                        socket.emit("hit", { roomId: currentRoom, targetId: p.id, damage: b.damage });
                        if (b.id === socket.id) showResult("VICTORY", "#10b981");
                        if (p.id === socket.id) showResult("DEFEAT", "#ef4444");
                        bullets.splice(index, 1);
                    }
                });
            });

            bullets = bullets.filter(b => b.x > 0 && b.x < canvas.width && b.y > 0 && b.y < canvas.height);

            items.forEach((item, index) => {
                const dist = Math.hypot(me.x - item.x, me.y - item.y);

                if (dist < 25) {
                    if (item.type === "HEAL") {
                        me.hp = Math.min(100, (me.hp || 100) + 30);
                        itemMessage = "+30 HP";
                        itemMessageTime = Date.now();
                    }
                    if (item.type === "SPEED") {
                        me.speedBoost = 2;
                        speedBuffEnd = Date.now() + 15000; // SỬA: Tăng thời gian buff lên 15 giây
                        itemMessage = "SPEED UP";
                        itemMessageTime = Date.now();
                    }
                    if (item.type === "DAMAGE") {
                        me.damage = 60;
                        damageBuffEnd = Date.now() + 15000; // SỬA: Tăng thời gian buff lên 15 giây
                        itemMessage = "DAMAGE UP";
                        itemMessageTime = Date.now();
                    }

                    items.splice(index, 1);
                    socket.emit("item-collected", { roomId: currentRoom, itemId: item.id, type: item.type });
                }
            });

            if (Date.now() > speedBuffEnd) { me.speedBoost = 0; }
            if (Date.now() > damageBuffEnd) { me.damage = 35; }

            socket.emit("move", { roomId: currentRoom, x: me.x, y: me.y, angle: me.angle });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#1e293b";

            for (let y = 0; y < maze.length; y++) {
                for (let x = 0; x < maze[y].length; x++) {
                    if (maze[y][x] === 1) { ctx.fillRect(x * 40, y * 40, 40, 40); }
                }
            }

            items.forEach(i => {
                ctx.fillStyle = i.type === "HEAL" ? "#22c55e" : (i.type === "SPEED" ? "#3b82f6" : "#ef4444");
                ctx.shadowBlur = 20;
                ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath();
                ctx.arc(i.x, i.y, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            Object.values(remotePlayers).forEach(p => {
                if (!p.alive) return;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.fillStyle = p.color;
                ctx.fillRect(-15, -12, 30, 24);
                ctx.fillStyle = "#000";
                ctx.fillRect(0, -3, 20, 6);
                ctx.restore();

                ctx.fillStyle = "#334155";
                ctx.fillRect(p.x - 20, p.y - 35, 40, 5);
                ctx.fillStyle = p.id === socket.id ? "#10b981" : "#ef4444";
                ctx.fillRect(p.x - 20, p.y - 35, ((p.hp || 100) / 100) * 40, 5);

                ctx.fillStyle = "white";
                ctx.font = "bold 10px Arial";
                ctx.textAlign = "center";
                ctx.fillText(p.name, p.x, p.y - 42);
            });

            ctx.fillStyle = "#fbbf24";
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });

            if (Date.now() - itemMessageTime < 2000) {
                ctx.fillStyle = "white";
                ctx.font = "bold 24px Arial";
                ctx.textAlign = "center";
                ctx.fillText(itemMessage, canvas.width / 2, 40);
            }

            // SỬA: Điều chỉnh tỉ lệ chia cho 15000 (15 giây) để thanh co ngắn lại mượt mà chính xác
            if (Date.now() < speedBuffEnd) {
                const remain = (speedBuffEnd - Date.now()) / 15000;
                ctx.fillStyle = "#3b82f6";
                ctx.fillRect(20, 20, 200 * remain, 15);
                ctx.fillStyle = "white";
                ctx.font = "bold 14px Arial";
                ctx.fillText("SPEED", 110, 32);
            }

            if (Date.now() < damageBuffEnd) {
                const remain = (damageBuffEnd - Date.now()) / 15000;
                ctx.fillStyle = "#ef4444";
                ctx.fillRect(20, 45, 200 * remain, 15);
                ctx.fillStyle = "white";
                ctx.font = "bold 14px Arial";
                ctx.fillText("DAMAGE", 110, 57);
            }
        }

        function showResult(text, color) {
            gameActive = false;
            const screen = document.getElementById("game-result");
            const resultText = document.getElementById("result-text");
            resultText.innerText = text;
            resultText.style.color = color;
            screen.classList.remove("hidden");
        }

        function gameLoop() {
            if (gameActive) {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
        }
    </script>
</body>

</html>
