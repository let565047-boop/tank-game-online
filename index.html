<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tank Maze Warrior - Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; background: #020617; touch-action: none; font-family: system-ui, sans-serif; color: white; overflow: hidden; }
        #gameCanvas { background: #0f172a; display: block; margin: auto; max-width: 95vw; max-height: 60vh; border: 4px solid #1e293b; border-radius: 16px; }
        .joystick-base { width: 110px; height: 110px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); border-radius: 50%; position: relative; }
        .joystick-stick { width: 45px; height: 45px; background: rgba(255,255,255,0.3); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-2">

    <div id="lobby" class="bg-slate-900/90 p-8 rounded-[2rem] shadow-2xl w-full max-w-sm border border-slate-800">
        <h1 class="text-5xl font-black mb-8 text-center text-amber-500 italic uppercase">Tank.io</h1>
        <div class="space-y-4">
            <input id="player-name" type="text" placeholder="Tên của sen" class="w-full p-4 bg-slate-950 rounded-2xl border border-slate-800 outline-none text-white font-bold">
            <input id="room-id" type="text" placeholder="Mã phòng" class="w-full p-4 bg-slate-950 rounded-2xl border border-slate-800 outline-none text-amber-500 font-bold">
            <button onclick="joinRoomAction()" class="w-full bg-amber-600 text-white p-4 rounded-2xl font-black hover:bg-amber-500 transition shadow-lg uppercase">Vào Phòng</button>
        </div>
    </div>

    <div id="waiting-room" class="hidden bg-slate-900/90 p-8 rounded-[2rem] shadow-2xl w-full max-w-sm border border-slate-800 text-center">
        <h2 class="text-xl font-bold mb-4">Đang chờ đồng đội...</h2>
        <div id="player-list" class="space-y-3 mb-8 text-left"></div>
        <button id="start-game-btn" onclick="triggerStartGame()" class="hidden w-full bg-emerald-600 p-5 rounded-2xl font-black text-xl uppercase">Khai chiến!</button>
    </div>

    <div id="game-container" class="hidden relative w-full flex flex-col items-center">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div class="w-full flex justify-between items-center mt-10 px-6 max-w-[640px]">
            <div id="joystick-zone" class="joystick-base"><div id="joystick-stick" class="joystick-stick"></div></div>
            <button onclick="shoot()" class="w-24 h-24 bg-red-600 rounded-[2rem] border-b-[10px] border-red-900 flex items-center justify-center active:border-b-0 active:translate-y-2"><span class="text-4xl">💣</span></button>
        </div>
    </div>

    <script>
        const socket = io();
        const TILE_SIZE = 40;
        const MAZE_SIZE = 15;
        let currentRoom = null;
        let remotePlayers = {};
        let bullets = [];
        let maze = []; 
        let gameActive = false;
        let shootCooldown = false;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function generateMaze(seed) {
            const m = Array(MAZE_SIZE).fill().map(() => Array(MAZE_SIZE).fill(1));
            let randomCounter = seed.split('').reduce((a, b) => a + b.charCodeAt(0), 0);
            const seededRandom = (s) => { let x = Math.sin(s++) * 10000; return x - Math.floor(x); };
            function walk(x, y) {
                m[y][x] = 0;
                const dirs = [[0, 2], [0, -2], [2, 0], [-2, 0]].sort(() => seededRandom(randomCounter++) - 0.5);
                for (let [dx, dy] of dirs) {
                    let nx = x + dx, ny = y + dy;
                    if (nx > 0 && nx < MAZE_SIZE && ny > 0 && ny < MAZE_SIZE && m[ny][nx] === 1) {
                        m[y + dy / 2][x + dx / 2] = 0; walk(nx, ny);
                    }
                }
            }
            walk(1, 1); return m;
        }

        window.joinRoomAction = () => {
            const rId = document.getElementById('room-id').value.trim();
            const pName = document.getElementById('player-name').value.trim() || "Vô danh";
            if(!rId) return;
            
            currentRoom = rId;
            maze = generateMaze(rId);
            
            socket.emit('join-room', { 
                roomId: rId, 
                playerName: pName,
                color: `hsl(${Math.random() * 360}, 70%, 50%)`
            });

            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('waiting-room').classList.remove('hidden');
        };

        socket.on('update-players', (players) => {
            remotePlayers = players;
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            let isHost = false;
            
            Object.values(players).forEach(p => {
                const li = document.createElement('div');
                li.className = "p-3 bg-slate-800 rounded-xl border-l-4";
                li.style.borderLeftColor = p.color;
                li.innerHTML = `<span class="font-bold">${p.name} ${p.id === socket.id ? '(BẠN)' : ''}</span>`;
                list.appendChild(li);
                if(p.id === socket.id && p.isHost) isHost = true;
            });

            if(isHost && Object.keys(players).length >= 1) {
                document.getElementById('start-game-btn').classList.remove('hidden');
            }
        });

        socket.on('game-started', () => {
            document.getElementById('waiting-room').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            gameActive = true;
            gameLoop();
        });

        socket.on('player-moved', (data) => {
            if(remotePlayers[data.id]) {
                remotePlayers[data.id].x = data.x;
                remotePlayers[data.id].y = data.y;
                remotePlayers[data.id].angle = data.angle;
            }
        });

        socket.on('new-bullet', (b) => bullets.push(b));

        function triggerStartGame() {
            socket.emit('start-game', currentRoom);
        }

        function canMoveTo(nx, ny) {
            const p = 12; // Bo góc xe tăng
            const pts = [{x:nx-p,y:ny-p}, {x:nx+p,y:ny-p}, {x:nx-p,y:ny+p}, {x:nx+p,y:ny+p}];
            for (let pt of pts) {
                const tx = Math.floor(pt.x / TILE_SIZE);
                const ty = Math.floor(pt.y / TILE_SIZE);
                if (maze[ty] && maze[ty][tx] === 1) return false;
            }
            return true;
        }

        function shoot() {
            const me = remotePlayers[socket.id];
            if (shootCooldown || !gameActive || !me?.alive) return;
            shootCooldown = true;
            setTimeout(() => shootCooldown = false, 600);

            const b = {
                x: me.x + Math.cos(me.angle) * 25,
                y: me.y + Math.sin(me.angle) * 25,
                vx: Math.cos(me.angle) * 6,
                vy: Math.sin(me.angle) * 6,
                owner: socket.id,
                roomId: currentRoom
            };
            socket.emit('shoot', b);
            bullets.push(b);
        }

        const keys = {};
        window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code==='Space') shoot(); });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            const me = remotePlayers[socket.id];
            if (!gameActive || !me?.alive) return;

            let dx = 0, dy = 0;
            const speed = 3.5;
            if (keys['ArrowUp'] || keys['KeyW']) dy = -speed;
            if (keys['ArrowDown'] || keys['KeyS']) dy = speed;
            if (keys['ArrowLeft'] || keys['KeyA']) dx = -speed;
            if (keys['ArrowRight'] || keys['KeyD']) dx = speed;

            if (dx !== 0 || dy !== 0) {
                const newX = me.x + dx; const newY = me.y + dy;
                const angle = Math.atan2(dy, dx);
                let changed = false;
                if (canMoveTo(newX, me.y)) { me.x = newX; changed = true; }
                if (canMoveTo(me.x, newY)) { me.y = newY; changed = true; }
                if (changed) {
                    me.angle = angle;
                    socket.emit('move', { roomId: currentRoom, x: me.x, y: me.y, angle: me.angle });
                }
            }

            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                if(!canMoveTo(b.x, b.y)) { bullets.splice(i, 1); return; }
                
                if (b.owner === socket.id) {
                    Object.values(remotePlayers).forEach(p => {
                        if (p.id !== socket.id && p.alive) {
                            const d = Math.sqrt((b.x - p.x)**2 + (b.y - p.y)**2);
                            if (d < 20) {
                                socket.emit('hit', { roomId: currentRoom, targetId: p.id });
                                bullets.splice(i, 1);
                            }
                        }
                    });
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#334155';
            for (let y = 0; y < MAZE_SIZE; y++) {
                for (let x = 0; x < MAZE_SIZE; x++) {
                    if (maze[y][x] === 1) ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
            }
            Object.values(remotePlayers).forEach(p => {
                if (!p.alive) return;
                ctx.save();
                ctx.translate(p.x, p.y); ctx.rotate(p.angle);
                ctx.fillStyle = p.color; ctx.fillRect(-15, -12, 30, 24);
                ctx.fillStyle = '#000'; ctx.fillRect(0, -3, 20, 6);
                ctx.restore();
                ctx.fillStyle = 'white'; ctx.textAlign = 'center';
                ctx.fillText(p.name, p.x, p.y - 25);
            });
            ctx.fillStyle = '#fbbf24';
            bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill(); });
        }

        function gameLoop() {
            if(!gameActive) return;
            update(); draw(); requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
